services:
  backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: mini_backend
    ports:
      - "8081:8081"
    env_file:
      - ./api/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: mini_frontend
    ports:
      - "8080:80"
    restart: unless-stopped
